<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TechERP - IT Ops Center Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "on-background": "#041b3c",
                        "on-secondary-fixed": "#002113",
                        "on-error": "#ffffff",
                        "surface-container": "#e8edff",
                        "surface": "#f9f9ff",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#00734c",
                        "tertiary-fixed": "#ffdad2",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f1f3ff",
                        "tertiary-container": "#b02300",
                        "on-primary-container": "#c4d2ff",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#82f9be",
                        "tertiary": "#851800",
                        "secondary-fixed-dim": "#65dca4",
                        "on-surface-variant": "#434654",
                        "inverse-surface": "#1d3052",
                        "on-surface": "#041b3c",
                        "surface-variant": "#d7e2ff",
                        "inverse-on-surface": "#edf0ff",
                        "background": "#f9f9ff",
                        "secondary-container": "#82f9be",
                        "on-secondary-fixed-variant": "#005235",
                        "surface-container-high": "#e0e8ff",
                        "on-primary-fixed-variant": "#0040a2",
                        "primary-container": "#0052cc",
                        "primary": "#003d9b",
                        "on-primary-fixed": "#001848",
                        "on-tertiary-fixed": "#3d0600",
                        "on-tertiary-fixed-variant": "#8b1a00",
                        "on-error-container": "#93000a",
                        "surface-dim": "#cadaff",
                        "secondary": "#006c47",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "surface-tint": "#0c56d0",
                        "inverse-primary": "#b2c5ff",
                        "outline-variant": "#c3c6d6",
                        "surface-container-highest": "#d7e2ff",
                        "primary-fixed": "#dae2ff",
                        "primary-fixed-dim": "#b2c5ff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#ffc6b9",
                        "tertiary-fixed-dim": "#ffb4a3",
                        "outline": "#737685"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "sidebar-width": "240px",
                        "container-margin": "24px",
                        "gutter": "16px",
                        "density-comfortable": "16px",
                        "unit": "4px",
                        "density-dense": "8px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "h3": ["Inter"],
                        "body-md": ["Inter"],
                        "h2": ["Inter"],
                        "code": ["Inter"],
                        "h1": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "h3": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h2": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "code": ["13px", { "lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "h1": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-surface-container-low min-h-screen flex items-center justify-center p-container-margin font-body-md text-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container">
    <main class="w-full max-w-[420px]">
        <div class="bg-surface border border-outline-variant rounded-lg p-10 flex flex-col gap-8 shadow-sm">
            <header class="flex flex-col items-center gap-3 text-center">
                <div class="flex items-center gap-2 text-primary">
                    <span class="material-symbols-outlined text-[32px]"
                        style="font-variation-settings: 'FILL' 1;">developer_board</span>
                    <h1 class="font-h1 text-h1 text-primary tracking-tight">TechERP</h1>
                </div>
                <div>
                    <h2 class="font-h3 text-h3 text-on-surface mb-1">Sign In</h2>
                    <p class="font-body-sm text-body-sm text-on-surface-variant">Access the IT Ops Center</p>
                </div>
            </header>
            <form class="flex flex-col gap-5">
                <div class="flex flex-col gap-1.5">
                    <label class="font-label-md text-label-md text-on-surface" for="username">Username</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[18px] text-outline">person</span>
                        <input
                            class="w-full h-10 pl-10 pr-3 bg-surface border border-outline-variant rounded focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body-sm text-body-sm text-on-surface placeholder:text-outline-variant transition-all"
                            id="username" name="username" placeholder="Enter system username" required="" type="text" />
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <div class="flex items-center justify-between">
                        <label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
                        <a class="font-body-sm text-body-sm text-primary hover:underline hover:text-on-primary-fixed-variant transition-colors"
                            href="#">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[18px] text-outline">lock</span>
                        <input
                            class="w-full h-10 pl-10 pr-3 bg-surface border border-outline-variant rounded focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body-sm text-body-sm text-on-surface placeholder:text-outline-variant transition-all"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                    </div>
                </div>
                <button
                    class="mt-2 h-10 w-full bg-primary text-on-primary font-label-md text-label-md rounded flex items-center justify-center gap-2 hover:brightness-95 transition-all duration-150 active:scale-[0.98]"
                    type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]"
                        style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
                </button>
            </form>
            <footer class="pt-6 border-t border-outline-variant text-center">
                <p class="font-body-sm text-body-sm text-outline flex items-center justify-center gap-1.5">
                    <span class="material-symbols-outlined text-[14px]">shield</span>
                    Secure Encrypted Connection
                </p>
            </footer>
        </div>
    </main>
</body>

</html>
